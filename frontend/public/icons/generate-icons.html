<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Icon Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
        }
        button {
            background: #0f172a;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #1e293b;
        }
        .preview {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .icon-preview {
            text-align: center;
        }
        canvas {
            border: 2px solid #444;
            border-radius: 10px;
            margin: 10px;
        }
        .info {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 PWA Icon Generator for GenFit AI</h1>
        <p>Click the button below to generate all required PWA icons. They will be downloaded automatically.</p>
        
        <button onclick="generateAllIcons()">Generate All Icons</button>
        
        <div class="info">
            <h3>Icons to be generated:</h3>
            <ul>
                <li>pwa-192x192.png (192x192 pixels)</li>
                <li>pwa-512x512.png (512x512 pixels)</li>
                <li>pwa-512x512-maskable.png (512x512 pixels, maskable)</li>
            </ul>
        </div>
        
        <div class="preview" id="preview"></div>
    </div>

    <script>
        function createIcon(size, isMaskable = false) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Background gradient (matching your theme: dark blue-gray)
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#0f172a'); // Dark blue-gray
            gradient.addColorStop(1, '#1e293b'); // Slightly lighter
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // For maskable icons, leave safe zone (80% of size)
            const safeZone = isMaskable ? size * 0.1 : 0;
            const iconSize = size - (safeZone * 2);
            const centerX = size / 2;
            const centerY = size / 2;
            
            // Draw a stylized "GF" or brain/sparkles icon
            ctx.fillStyle = '#10b981'; // Green
            ctx.font = `bold ${iconSize * 0.4}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw "GF" text
            ctx.fillText('GF', centerX, centerY - iconSize * 0.1);
            
            // Add sparkle effect
            ctx.fillStyle = '#3b82f6'; // Blue
            const sparkleSize = iconSize * 0.15;
            const sparkles = [
                { x: centerX - iconSize * 0.3, y: centerY - iconSize * 0.3 },
                { x: centerX + iconSize * 0.3, y: centerY - iconSize * 0.2 },
                { x: centerX - iconSize * 0.25, y: centerY + iconSize * 0.25 },
                { x: centerX + iconSize * 0.25, y: centerY + iconSize * 0.3 }
            ];
            
            sparkles.forEach(sparkle => {
                ctx.beginPath();
                ctx.arc(sparkle.x, sparkle.y, sparkleSize * 0.3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            return canvas;
        }
        
        function downloadCanvas(canvas, filename) {
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        }
        
        function generateAllIcons() {
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            
            // Generate 192x192 icon
            const icon192 = createIcon(192, false);
            downloadCanvas(icon192, 'pwa-192x192.png');
            addPreview(icon192, '192x192');
            
            // Generate 512x512 icon
            const icon512 = createIcon(512, false);
            downloadCanvas(icon512, 'pwa-512x512.png');
            addPreview(icon512, '512x512');
            
            // Generate 512x512 maskable icon
            const icon512Maskable = createIcon(512, true);
            downloadCanvas(icon512Maskable, 'pwa-512x512-maskable.png');
            addPreview(icon512Maskable, '512x512 (Maskable)');
            
            alert('✅ All icons generated! Check your Downloads folder.\n\nNow copy these files to: frontend/public/icons/');
        }
        
        function addPreview(canvas, label) {
            const preview = document.getElementById('preview');
            const div = document.createElement('div');
            div.className = 'icon-preview';
            div.innerHTML = `<p>${label}</p>`;
            div.appendChild(canvas);
            preview.appendChild(div);
        }
    </script>
</body>
</html>
